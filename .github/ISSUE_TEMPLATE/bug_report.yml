name: Bug Report
description: Report a bug or unexpected behavior in the package.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please search existing issues to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or code snippet that reproduces the issue.
      placeholder: |
        1. Set up TitleWithSlug with these options: ...
        2. Type "..." in the title field
        3. See error / unexpected slug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package Version
      description: Output of `composer show blendbyte/filament-title-with-slug`
      placeholder: "e.g. 2.1.0"
    validations:
      required: true

  - type: dropdown
    id: php_version
    attributes:
      label: PHP Version
      options:
        - "8.2"
        - "8.3"
        - "8.4"
        - "8.5"
    validations:
      required: true

  - type: dropdown
    id: laravel_version
    attributes:
      label: Laravel Version
      options:
        - "11.x"
        - "12.x"
        - "13.x"
    validations:
      required: true

  - type: input
    id: filament_version
    attributes:
      label: Filament Version
      description: Output of `composer show filament/filament | grep versions`
      placeholder: "e.g. 5.0.1"
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant Configuration
      description: Share the `TitleWithSlug` field configuration you are using.
      render: php

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant — screenshots, related issues, etc.
